<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>站点域名已迁移</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #07111f;
      color: #e5edf7;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, #18345a 0, transparent 42%),
        #07111f;
    }
    main {
      width: min(620px, 100%);
      padding: 48px;
      border: 1px solid #294666;
      border-radius: 20px;
      background: rgba(10, 25, 43, .92);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .35);
      text-align: center;
    }
    h1 { margin: 0 0 18px; font-size: clamp(30px, 6vw, 44px); }
    p { margin: 0 0 28px; color: #aac0d8; font-size: 18px; line-height: 1.7; }
    a {
      display: inline-block;
      padding: 13px 22px;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-weight: 650;
      text-decoration: none;
    }
    a:hover { background: #2563eb; }
    small { display: block; margin-top: 22px; color: #7289a3; }
  </style>
</head>
<body>
  <main>
    <h1>站点域名已迁移</h1>
    <p>本站已迁移至新域名，请更新书签和 API 配置后继续访问。</p>
    <a href="https://codex.lizubin.online/">前往 codex.lizubin.online</a>
    <small>旧域名不再提供 API 服务</small>
  </main>
</body>
</html>
