server {
    listen 80;
    listen [::]:80;
    server_name portal.lizubin.online;

    root /var/www/sub2api-retired;
    index index.html;

    add_header Cache-Control "no-store" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        try_files /index.html =404;
    }
}
