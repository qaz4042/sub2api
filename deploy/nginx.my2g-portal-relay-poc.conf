server {
    listen 80;
    listen [::]:80;
    server_name portal.lizubin.online;

    root /var/www/sub2api-retired;
    index index.html;

    add_header Cache-Control "no-store" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    location ~ ^/(health|responses|v1/|openai/) {
        proxy_pass https://codex-direct.lizubin.online;

        proxy_ssl_server_name on;
        proxy_ssl_name codex-direct.lizubin.online;

        proxy_http_version 1.1;
        proxy_set_header Host codex-direct.lizubin.online;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    location /relay/ {
        rewrite ^/relay/(.*)$ /$1 break;
        proxy_pass https://codex-direct.lizubin.online;

        proxy_ssl_server_name on;
        proxy_ssl_name codex-direct.lizubin.online;

        proxy_http_version 1.1;
        proxy_set_header Host codex-direct.lizubin.online;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files /index.html =404;
    }
}
